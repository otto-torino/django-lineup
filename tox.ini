[tox]
envlist =
    django-42
    django-50
    django-60

[testenv]
setenv =
    PYTHONPATH = {toxinidir}:{toxinidir}/lineup
commands = coverage run --source lineup runtests.py
deps =
    django-42: Django>=4.2,<4.3
    django-50: Django>=5.0,<5.1
    django-60: Django>=6.0,<6.1
    -r{toxinidir}/requirements_test.txt
